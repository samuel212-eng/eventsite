{% extends "base.html" %}
{% block title %}Delete Event{% endblock %}

{% block content %}
<div class="container my-5" style="max-width:500px;">
  <div style="
    background:var(--card-bg); border:1px solid rgba(255,77,109,0.3);
    border-radius:20px; padding:2.5rem; text-align:center;
  ">
    <div style="font-size:3.5rem; margin-bottom:1rem;">🗑️</div>
    <h2 style="margin-bottom:.75rem;">Delete Event?</h2>
    <p style="color:var(--muted); margin-bottom:2rem;">
      You're about to permanently delete <strong style="color:var(--text);">{{ event.title }}</strong>.
      This cannot be undone and all registrations will be lost.
    </p>
    <form method="POST" class="d-flex gap-3 justify-content-center">
      {% csrf_token %}
      <button type="submit" class="btn btn-sm" style="
        background:var(--brand); color:#fff; border:none; border-radius:50px;
        padding:.65rem 1.8rem; font-weight:600;">
        Yes, Delete
      </button>
      <a href="{% url 'event_detail' event.pk %}" class="btn btn-outline-brand btn-sm">
        Cancel
      </a>
    </form>
  </div>
</div>
{% endblock %}
